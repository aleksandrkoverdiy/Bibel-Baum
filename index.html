<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Архив Родословия 7.0 (Final Fix)</title>
    
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>
    
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #3e2723; overflow: hidden; font-family: 'Times New Roman', serif;
        }
        
        /* КОМПАКТНЫЙ ПОИСК */
        #search-container {
            position: absolute; top: 10px; left: 10px; z-index: 1000;
            display: flex; gap: 5px; background: rgba(253, 245, 230, 0.9);
            padding: 5px; border: 1px solid #5d4037; border-radius: 4px;
        }
        #search-input { border: 1px solid #5d4037; padding: 4px; width: 150px; font-size: 13px; }

        /* КОНТЕЙНЕР ПЕРГАМЕНТА */
        #tree-container { 
            width: 100vw; height: 100vh; 
            background: #fdf5e6 url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            position: relative; z-index: 1; overflow: hidden;
        }

        #mermaid-output { width: 100%; height: 100%; }

        /* МЕНЮ И ОКНА */
        #context-menu { 
            display: none; position: fixed; background: #fffcf5; border: 2px solid #5d4037; 
            z-index: 9999; min-width: 150px; box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
        }
        #context-menu div { padding: 8px 12px; cursor: pointer; border-bottom: 1px solid #d2b48c; font-size: 14px; }
        #context-menu div:hover { background: #e6ccb2; }

        #info-modal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 280px; background: #fffcf5; border: 4px double #5d4037; padding: 20px; 
            z-index: 10001; text-align: center;
        }
        #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 10000; }

        /* ФИКС SVG */
        svg { 
            background: transparent !important; 
            display: block !important; 
            max-height: 100% !important; 
            max-width: 100% !important;
        }
        .infoNode rect { fill: #fcf3cf !important; stroke: #b7950b !important; stroke-width: 3px !important; }
        .highlight rect { fill: #ff9800 !important; stroke: #e65100 !important; stroke-width: 4px !important; }
    </style>
</head>
<body>

<div id="search-container">
    <input type="text" id="search-input" list="names-list" placeholder="Поиск..." onkeypress="if(event.key === 'Enter') findPerson()">
    <datalist id="names-list"></datalist>
    <button onclick="findPerson()" style="cursor:pointer; background:#5d4037; color:#fff; border:none; padding:4px 8px;">🔍</button>
</div>

<div id="modal-overlay" onclick="closeInfo()"></div>
<div id="info-modal">
    <h3 id="modal-title" style="margin:0;"></h3>
    <p id="modal-desc" style="font-size:14px; margin:15px 0;"></p>
    <button onclick="closeInfo()" style="padding:5px 15px; background:#5d4037; color:#fff; border:none; cursor:pointer;">Закрыть</button>
</div>

<div id="context-menu">
    <div onclick="menuAction('edit')">✏️ Имя</div>
    <div onclick="menuAction('info')" id="menu-info-btn">📜 Инфо</div>
    <div onclick="menuAction('add')">➕ Потомок</div>
    <div onclick="menuAction('delete')" style="color:#a00;">❌ Удалить</div>
</div>

<div id="tree-container">
    <div id="mermaid-output"></div>
</div>

<script>
    let selectedNodeId = null;
    let currentGraphDefinition = localStorage.getItem('genealogy_graph') || `graph TD\n    Adam[Адам] --> Seth[Сиф]`;
    let nodesData = JSON.parse(localStorage.getItem('genealogy_info')) || { "Adam": "Первый человек." };

    mermaid.initialize({ startOnLoad: false, securityLevel: 'loose', theme: 'neutral' });

    async function renderGraph() {
        const out = document.getElementById('mermaid-output');
        if (window.panZoom) { window.panZoom.destroy(); window.panZoom = null; }
        out.innerHTML = '';

        localStorage.setItem('genealogy_graph', currentGraphDefinition);
        localStorage.setItem('genealogy_info', JSON.stringify(nodesData));

        let styles = "";
        Object.keys(nodesData).forEach(id => { styles += `\n    class ${id} infoNode`; });

        try {
            const { svg } = await mermaid.render('mermaid-svg-' + Date.now(), currentGraphDefinition + styles);
            out.innerHTML = svg;
            const svgEl = out.querySelector('svg');
            
            // --- КЛЮЧЕВОЙ ФИКС: УДАЛЕНИЕ ПУСТОТ ---
            svgEl.removeAttribute('height'); // Убираем фиксированную высоту
            const bbox = svgEl.getBBox();
            // Пересчитываем viewBox только под размер элементов схемы
            svgEl.setAttribute('viewBox', `${bbox.x} ${bbox.y} ${bbox.width} ${bbox.height}`);
            
            // Очистка фонов
            svgEl.querySelectorAll('rect').forEach(r => {
                if (r.getAttribute('fill') === 'white') r.setAttribute('fill', 'transparent');
            });

            setTimeout(() => {
                window.panZoom = svgPanZoom(svgEl, { zoomEnabled: true, fit: true, center: true, minZoom: 0.01 });
                updateList();
            }, 50);
        } catch (err) { console.error(err); }
    }

    function updateList() {
        const list = document.getElementById('names-list'); list.innerHTML = "";
        document.querySelectorAll('.node').forEach(n => {
            const opt = document.createElement('option');
            opt.value = n.querySelector('.nodeLabel').innerText;
            list.appendChild(opt);
        });
    }

    function findPerson() {
        const val = document.getElementById('search-input').value.toLowerCase().trim();
        document.querySelectorAll('.node').forEach(n => {
            if (n.querySelector('.nodeLabel').innerText.toLowerCase() === val) {
                n.classList.add('highlight'); setTimeout(() => n.classList.remove('highlight'), 2000);
                const b = n.getBBox(), s = window.panZoom.getSizes(), r = window.panZoom.getSizes().realZoom;
                window.panZoom.pan({ x: (s.width/2) - ((b.x + b.width/2)*r), y: (s.height/2) - ((b.y + b.height/2)*r) });
            }
        });
    }

    window.addEventListener('mousedown', function(e) {
        const n = e.target.closest('.node');
        if (!n) { if (e.button === 0) document.getElementById('context-menu').style.display='none'; return; }
        selectedNodeId = n.getAttribute('id').split('-')[1];
        if (e.button === 2) {
            e.preventDefault();
            const m = document.getElementById('context-menu');
            m.style.display='block'; m.style.left=e.pageX+'px'; m.style.top=e.pageY+'px';
        } else if (e.button === 0 && nodesData[selectedNodeId]) showInfo(selectedNodeId);
    });

    window.oncontextmenu = (e) => { if(e.target.closest('.node')) return false; };

    function showInfo(id) {
        document.getElementById('modal-title').innerText = document.querySelector(`#flowchart-${id}- .nodeLabel`).innerText;
        document.getElementById('modal-desc').innerText = nodesData[id];
        document.getElementById('info-modal').style.display='block';
        document.getElementById('modal-overlay').style.display='block';
    }

    function closeInfo() { document.getElementById('info-modal').style.display='none'; document.getElementById('modal-overlay').style.display='none'; }

    function menuAction(t) {
        if (!selectedNodeId) return;
        document.getElementById('context-menu').style.display='none';
        if (t === 'info') {
            const v = prompt("Описание:", nodesData[selectedNodeId] || "");
            if (v !== null) nodesData[selectedNodeId] = v;
        } else if (t === 'edit') {
            const v = prompt("Имя:");
            if (v) currentGraphDefinition = currentGraphDefinition.replace(new RegExp(`${selectedNodeId}\\[.*?\\]`, 'g'), `${selectedNodeId}[${v}]`);
        } else if (t === 'add') {
            const v = prompt("Имя потомка:");
            if (v) currentGraphDefinition += `\n    ${selectedNodeId} --> ${"id"+Math.random().toString(36).substr(2,5)}[${v}]`;
        } else if (t === 'delete') {
            if (confirm("Удалить?")) {
                currentGraphDefinition = currentGraphDefinition.split('\n').filter(l => !l.includes(selectedNodeId)).join('\n');
                delete nodesData[selectedNodeId];
            }
        }
        renderGraph();
    }
    window.onload = renderGraph;
</script>

</body>
</html>
