<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Библейская Родословная</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #2c1e14; font-family: 'Georgia', serif; }
        
        /* Свиток */
        #viewport { width: 100vw; height: 100vh; cursor: grab; overflow: hidden; position: relative; }
        #scroll-container { 
            position: absolute; 
            width: 5000px; height: 5000px; 
            background: #f4e4bc url('https://www.transparenttextures.com/patterns/parchment.png');
            transform-origin: 0 0;
        }

        /* Поиск */
        #search-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 100; }
        #search { padding: 10px 20px; border-radius: 20px; border: 2px solid #8b4513; background: #fff9e6; width: 250px; outline: none; }

        /* Имена */
        .person {
            position: absolute;
            padding: 8px 15px;
            background: rgba(139, 69, 19, 0.05);
            border: 1px solid transparent;
            border-radius: 4px;
            cursor: pointer;
            text-align: center;
            white-space: nowrap;
            user-select: none;
            color: #3e2723;
        }
        .has-info { border: 2px solid #8b4513; box-shadow: 0 0 5px rgba(139, 69, 19, 0.3); }
        .highlight { background: #ffeb3b !important; border: 2px solid #f44336 !important; }

        /* Линии */
        .line { position: absolute; background: #8b4513; height: 2px; transform-origin: 0 0; pointer-events: none; opacity: 0.6; }

        /* Меню */
        #context-menu {
            position: fixed; display: none; background: #fff; border: 1px solid #8b4513;
            box-shadow: 3px 3px 10px rgba(0,0,0,0.2); z-index: 1000; min-width: 180px;
        }
        #context-menu div { padding: 10px 15px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 14px; }
        #context-menu div:last-child { border: none; }
        #context-menu div:hover { background: #fdf5e6; color: #8b4513; }
    </style>
</head>
<body>

<div id="search-container">
    <input type="text" id="search" placeholder="Найти имя в роду...">
</div>

<div id="viewport">
    <div id="scroll-container">
        <div id="tree-content"></div>
    </div>
</div>

<div id="context-menu"></div>

<script>
    const content = document.getElementById('tree-content');
    const container = document.getElementById('scroll-container');
    const menu = document.getElementById('context-menu');
    const searchInput = document.getElementById('search');

    let scale = 1;
    let isOwner = window.location.hash === '#admin';
    let familyData = JSON.parse(localStorage.getItem('bibleTree')) || [
        { id: 1, name: "Адам", info: "Первый человек", x: 2500, y: 100, parentId: null }
    ];

    // Отрисовка
    function render() {
        content.innerHTML = '';
        familyData.forEach(person => {
            // Создаем узел имени
            const div = document.createElement('div');
            div.className = `person ${person.info ? 'has-info' : ''}`;
            div.id = `p-${person.id}`;
            div.style.left = person.x + 'px';
            div.style.top = person.y + 'px';
            div.innerText = person.name;

            // ЛКМ: Просмотр инфо (для всех)
            div.onclick = (e) => {
                e.stopPropagation();
                if (person.info) alert(`Информация о герое (${person.name}):\n\n${person.info}`);
            };

            // ПКМ: Меню (только админ)
            div.oncontextmenu = (e) => {
                if (!isOwner) return;
                e.preventDefault();
                e.stopPropagation();
                showMenu(e.clientX, e.clientY, person);
            };

            content.appendChild(div);

            // Рисуем линию к родителю
            if (person.parentId) {
                const parent = familyData.find(p => p.id === person.parentId);
                if (parent) drawLine(parent.x + 40, parent.y + 30, person.x + 40, person.y);
            }
        });
        localStorage.setItem('bibleTree', JSON.stringify(familyData));
    }

    function drawLine(x1, y1, x2, y2) {
        const length = Math.sqrt((x2-x1)**2 + (y2-y1)**2);
        const angle = Math.atan2(y2-y1, x2-x1) * 180 / Math.PI;
        const line = document.createElement('div');
        line.className = 'line';
        line.style.width = length + 'px';
        line.style.left = x1 + 'px';
        line.style.top = y1 + 'px';
        line.style.transform = `rotate(${angle}deg)`;
        content.appendChild(line);
    }

    // Логика меню
    function showMenu(x, y, person) {
        menu.style.display = 'block';
        menu.style.left = x + 'px';
        menu.style.top = y + 'px';
        
        if (person) {
            menu.innerHTML = `
                <div onclick="addRelative(${person.id})">➕ Добавить наследника</div>
                <div onclick="editName(${person.id})">📝 Редактировать имя</div>
                <div onclick="editInfo(${person.id})">ℹ️ ${person.info ? 'Редактировать' : 'Добавить'} информацию</div>
                <div onclick="deletePerson(${person.id})" style="color:red">🗑️ Удалить</div>
            `;
        } else {
            menu.innerHTML = `<div onclick="createNew(${x}, ${y})">🌟 Создать новое имя здесь</div>`;
        }
    }

    // Функции действий
    window.createNew = (clickX, clickY) => {
        const name = prompt("Введите имя:");
        if (name) {
            // Вычисляем координаты с учетом масштаба и прокрутки
            const rect = container.getBoundingClientRect();
            const realX = (clickX - rect.left) / scale;
            const realY = (clickY - rect.top) / scale;
            familyData.push({ id: Date.now(), name, info: "", x: realX, y: realY, parentId: null });
            render();
        }
    };

    window.addRelative = (parentId) => {
        const name = prompt("Имя наследника:");
        if (name) {
            const parent = familyData.find(p => p.id === parentId);
            // Смещение, чтобы не накладывались: вниз на 80 и чуть в сторону если детей много
            const childrenCount = familyData.filter(p => p.parentId === parentId).length;
            familyData.push({ 
                id: Date.now(), 
                name, 
                info: "", 
                x: parent.x + (childrenCount * 30), 
                y: parent.y + 80, 
                parentId: parentId 
            });
            render();
        }
    };

    window.editName = (id) => {
        const person = familyData.find(p => p.id === id);
        const newName = prompt("Изменить имя:", person.name);
        if (newName) { person.name = newName; render(); }
    };

    window.editInfo = (id) => {
        const person = familyData.find(p => p.id === id);
        const newInfo = prompt("Введите информацию о герое:", person.info);
        if (newInfo !== null) { person.info = newInfo; render(); }
    };

    window.deletePerson = (id) => {
        if (confirm("Удалить этого человека и его связи?")) {
            familyData = familyData.filter(p => p.id !== id && p.parentId !== id);
            render();
        }
    };

    // Поиск
    searchInput.oninput = () => {
        const val = searchInput.value.toLowerCase();
        document.querySelectorAll('.person').forEach(el => {
            el.classList.remove('highlight');
            if (val && el.innerText.toLowerCase().includes(val)) {
                el.classList.add('highlight');
            }
        });
    };

    // Зум и перемещение
    window.addEventListener('wheel', (e) => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        scale = Math.min(Math.max(.1, scale * delta), 3);
        container.style.transform = `scale(${scale})`;
    }, {passive: false});

    window.oncontextmenu = (e) => {
        if (!isOwner) return;
        if (e.target.id === 'viewport' || e.target === container) {
            e.preventDefault();
            showMenu(e.clientX, e.clientY, null);
        }
    };

    window.onclick = () => menu.style.display = 'none';

    render();
</script>
</body>
</html>
