<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактор Родословия</title>
    
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>
    
    <style>
        body { 
            margin: 0; background-color: #3e2723; font-family: 'Times New Roman', serif;
            color: #3e2723; overflow: hidden;
        }

        #scroll-wrapper {
            width: 95vw; height: 90vh; margin: 5vh auto; background: #fdf5e6;
            border: 15px solid #5d4037; position: relative; display: flex; flex-direction: column;
        }

        #tree-container { flex-grow: 1; overflow: hidden; }

        /* КОНТЕКСТНОЕ МЕНЮ */
        #context-menu {
            display: none; position: fixed; background: #fffcf5;
            border: 2px solid #5d4037; box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
            z-index: 1000; min-width: 150px;
        }
        #context-menu div {
            padding: 10px 15px; cursor: pointer; border-bottom: 1px solid #eee;
            font-size: 14px; transition: background 0.2s;
        }
        #context-menu div:hover { background: #e6ccb2; }
        #context-menu div:last-child { border-bottom: none; }

        .header { padding: 10px; text-align: center; border-bottom: 2px double #5d4037; }
        .controls { position: absolute; bottom: 20px; right: 20px; z-index: 10; }
        button { background: #5d4037; color: white; border: none; padding: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div id="context-menu">
    <div onclick="menuAction('edit')">✏️ Изменить имя</div>
    <div onclick="menuAction('add')">➕ Добавить потомка</div>
    <div onclick="menuAction('delete')" style="color: #a00;">❌ Удалить узел</div>
</div>

<div id="scroll-wrapper">
    <div class="header">
        <h2 style="margin:0;">РЕДАКТОР РОДОСЛОВИЯ</h2>
        <small>ПКМ на узле для меню разработчика</small>
    </div>
    <div id="tree-container">
        <div class="mermaid" id="mainTree">
            graph TD
                Adam[Адам] --> Seth[Сиф]
                Seth --> Enos[Енос]
        </div>
    </div>
    <div class="controls">
        <button onclick="exportCode()">Выгрузить код графа</button>
    </div>
</div>

<script>
    let selectedNodeId = null;
    let currentGraphDefinition = `graph TD\n    Adam[Адам] --> Seth[Сиф]\n    Seth --> Enos[Енос]`;

    mermaid.initialize({ startOnLoad: false, securityLevel: 'loose', theme: 'neutral' });

    // Отрисовка графа
    async function renderGraph() {
        const container = document.getElementById('tree-container');
        container.innerHTML = `<div class="mermaid" id="mainTree">${currentGraphDefinition}</div>`;
        await mermaid.run();
        setupPanZoom();
    }

    function setupPanZoom() {
        const svg = document.querySelector('#tree-container svg');
        if (svg) {
            svg.setAttribute('width', '100%');
            svg.setAttribute('height', '100%');
            svgPanZoom(svg, { zoomEnabled: true, controlIconsEnabled: true, center: true });
        }
    }

    // Обработка правой кнопки мыши
    window.addEventListener('contextmenu', function(e) {
        const node = e.target.closest('.node');
        if (node) {
            e.preventDefault();
            selectedNodeId = node.id.split('-')[1]; // Mermaid ID
            const menu = document.getElementById('context-menu');
            menu.style.display = 'block';
            menu.style.left = e.pageX + 'px';
            menu.style.top = e.pageY + 'px';
        } else {
            document.getElementById('context-menu').style.display = 'none';
        }
    });

    window.addEventListener('click', () => {
        document.getElementById('context-menu').style.display = 'none';
    });

    // Действия меню
    function menuAction(type) {
        if (!selectedNodeId) return;

        if (type === 'edit') {
            const newName = prompt("Введите новое имя:");
            if (newName) {
                // Заменяем текст в определении (упрощенно)
                const regex = new RegExp(`${selectedNodeId}\\[.*?\\]`, 'g');
                currentGraphDefinition = currentGraphDefinition.replace(regex, `${selectedNodeId}[${newName}]`);
            }
        } 
        else if (type === 'add') {
            const childId = "node_" + Math.random().toString(36).substr(2, 5);
            const childName = prompt("Имя потомка:");
            if (childName) {
                currentGraphDefinition += `\n    ${selectedNodeId} --> ${childId}[${childName}]`;
            }
        } 
        else if (type === 'delete') {
            if (confirm("Удалить этот узел и связи?")) {
                const lines = currentGraphDefinition.split('\n');
                currentGraphDefinition = lines.filter(line => !line.includes(selectedNodeId)).join('\n');
            }
        }

        renderGraph();
    }

    function exportCode() {
        console.log("Текущий код графа:\n", currentGraphDefinition);
        alert("Код выведен в консоль (F12)");
    }

    // Первый запуск
    window.onload = renderGraph;
</script>

</body>
</html>
