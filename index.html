<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Библейская Родословная</title>
    <style>
        /* Стиль старого свитка */
        body {
            margin: 0;
            overflow: hidden;
            background-color: #2c1e14;
            font-family: 'Georgia', serif;
        }

        #scroll-container {
            width: 100vw;
            height: 100vh;
            background: #f4e4bc;
            background-image: url('https://www.transparenttextures.com/patterns/parchment.png');
            cursor: grab;
            transform-origin: 0 0;
            position: relative;
        }

        /* Поиск */
        #search-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
        }

        input#search {
            padding: 10px;
            border-radius: 20px;
            border: 2px solid #8b4513;
            background: #fff9e6;
            width: 250px;
        }

        /* Узлы (имена) */
        .person {
            position: absolute;
            padding: 10px 20px;
            background: rgba(139, 69, 19, 0.1);
            border: 1px solid transparent;
            border-radius: 5px;
            cursor: pointer;
            text-align: center;
            transition: transform 0.2s;
            user-select: none;
        }

        .has-info {
            border: 2px solid #8b4513;
            font-weight: bold;
        }

        /* Контекстное меню */
        #context-menu {
            position: absolute;
            display: none;
            background: #fff;
            border: 1px solid #ccc;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
            z-index: 1000;
        }

        #context-menu div {
            padding: 8px 12px;
            cursor: pointer;
        }

        #context-menu div:hover {
            background: #eee;
        }

        /* Линии связи */
        .line {
            position: absolute;
            background: #8b4513;
            height: 2px;
            transform-origin: 0 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="search-container">
    <input type="text" id="search" placeholder="Поиск имени...">
</div>

<div id="scroll-container">
    <div id="tree-content"></div>
</div>

<div id="context-menu"></div>

<script>
    // Состояние приложения
    let familyData = JSON.parse(localStorage.getItem('bibleTree')) || [
        { id: 1, name: "Адам", info: "Первый человек", x: 500, y: 100, parentId: null }
    ];

    const container = document.getElementById('scroll-container');
    const content = document.getElementById('tree-content');
    const menu = document.getElementById('context-menu');
    let scale = 1;
    let isOwner = window.location.hash === '#admin'; // Вход как админ через #admin в URL

    // Отрисовка дерева
    function render() {
        content.innerHTML = '';
        familyData.forEach(person => {
            const div = document.createElement('div');
            div.className = `person ${person.info ? 'has-info' : ''}`;
            div.style.left = person.x + 'px';
            div.style.top = person.y + 'px';
            div.innerText = person.name;

            // Клик для просмотра инфо
            div.onclick = () => {
                if (person.info) alert(`${person.name}: ${person.info}`);
            };

            // Правый клик для меню
            div.oncontextmenu = (e) => {
                if (!isOwner) return;
                e.preventDefault();
                showMenu(e.pageX, e.pageY, person);
            };

            content.appendChild(div);

            // Отрисовка линии к родителю
            if (person.parentId) {
                const parent = familyData.find(p => p.id === person.parentId);
                if (parent) drawLine(parent.x + 50, parent.y + 30, person.x + 50, person.y);
            }
        });
        localStorage.setItem('bibleTree', JSON.stringify(familyData));
    }

    function drawLine(x1, y1, x2, y2) {
        const length = Math.sqrt((x2-x1)**2 + (y2-y1)**2);
        const angle = Math.atan2(y2-y1, x2-x1) * 180 / Math.PI;
        const line = document.createElement('div');
        line.className = 'line';
        line.style.width = length + 'px';
        line.style.left = x1 + 'px';
        line.style.top = y1 + 'px';
        line.style.transform = `rotate(${angle}deg)`;
        content.appendChild(line);
    }

    // Управление меню
    function showMenu(x, y, person) {
        menu.style.display = 'block';
        menu.style.left = x + 'px';
        menu.style.top = y + 'px';
        
        let html = '';
        if (person) {
            html = `
                <div onclick="addRelative(${person.id})">Добавить наследника</div>
                <div onclick="editName(${person.id})">Редактировать имя</div>
                <div onclick="editInfo(${person.id})">${person.info ? 'Редактировать' : 'Добавить'} информацию</div>
                <div onclick="deletePerson(${person.id})">Удалить</div>
            `;
        } else {
            html = `<div onclick="createNew()">Создать новое имя</div>`;
        }
        menu.innerHTML = html;
    }

    // Функции редактирования
    window.createNew = () => {
        const name = prompt("Введите имя:");
        if (name) {
            familyData.push({ id: Date.now(), name, info: "", x: 500, y: 100, parentId: null });
            render();
        }
    };

    window.addRelative = (parentId) => {
        const name = prompt("Имя наследника:");
        const parent = familyData.find(p => p.id === parentId);
        if (name) {
            familyData.push({ 
                id: Date.now(), 
                name, 
                info: "", 
                x: parent.x, 
                y: parent.y + 100, 
                parentId: parentId 
            });
            render();
        }
    };

    // Масштабирование
    window.addEventListener('wheel', (e) => {
        e.preventDefault();
        scale += e.deltaY * -0.001;
        scale = Math.min(Math.max(.125, scale), 4);
        container.style.transform = `scale(${scale})`;
    }, {passive: false});

    // Обработка клика по фону
    window.oncontextmenu = (e) => {
        if (!isOwner) return;
        if (e.target === container || e.target === document.body) {
            e.preventDefault();
            showMenu(e.pageX, e.pageY, null);
        }
    };

    window.onclick = () => menu.style.display = 'none';

    render();
</script>
</body>
</html>
