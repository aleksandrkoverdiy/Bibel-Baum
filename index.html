<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактор Родословия 3.0</title>
    
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>
    
    <style>
        body { 
            margin: 0; background-color: #3e2723; 
            font-family: 'Segoe UI', serif;
            overflow: hidden;
        }

        #scroll-wrapper {
            width: 95vw; height: 92vh; margin: 4vh auto; 
            background: #fdf5e6; border: 12px solid #5d4037;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            position: relative; 
            overflow: hidden; /* Важно: холст не должен выходить за границы */
        }

        /* Заголовок теперь парит над схемой */
        .header { 
            position: absolute; top: 0; left: 0; right: 0;
            padding: 15px; text-align: center; 
            background: rgba(253, 245, 230, 0.8);
            border-bottom: 1px solid rgba(93, 64, 55, 0.2);
            z-index: 5; pointer-events: none; /* Пропускает клики сквозь себя к схеме */
        }
        .header h2, .header small { pointer-events: auto; }

        /* Холст занимает 100% пространства свитка */
        #tree-container { 
            width: 100%; height: 100%; 
            position: absolute; top: 0; left: 0;
            cursor: grab;
        }

        #context-menu {
            display: none; position: fixed; background: #fff;
            border: 2px solid #5d4037; box-shadow: 4px 4px 15px rgba(0,0,0,0.4);
            z-index: 9999; min-width: 180px;
        }
        #context-menu div {
            padding: 12px 15px; cursor: pointer; border-bottom: 1px solid #eee;
        }
        #context-menu div:hover { background: #f0e6d2; }

        .controls { position: absolute; bottom: 20px; right: 20px; z-index: 10; display: flex; gap: 10px; }
        button { 
            background: #5d4037; color: white; border: none; 
            padding: 10px 15px; cursor: pointer; border-radius: 4px;
        }

        /* Фикс для SVG Mermaid */
        svg {
            display: block;
            width: 100% !important;
            height: 100% !important;
            max-width: none !important;
        }
    </style>
</head>
<body>

<div id="context-menu">
    <div onclick="menuAction('edit')">✏️ Изменить имя</div>
    <div onclick="menuAction('add')">➕ Добавить потомка</div>
    <div onclick="menuAction('delete')" style="color: #d32f2f;">❌ Удалить узел</div>
</div>

<div id="scroll-wrapper">
    <div class="header">
        <h2 style="margin:0;">ДРЕВО РОДОСЛОВИЯ</h2>
        <small>ПКМ на имя — редактировать. Колесико — масштаб.</small>
    </div>
    
    <div id="tree-container"></div>

    <div class="controls">
        <button onclick="resetView()">Центрировать</button>
        <button onclick="exportCode()" style="background: #2e7d32;">В консоль</button>
    </div>
</div>

<script>
    let selectedNodeId = null;
    let currentGraphDefinition = `graph TD
    Adam[Адам] --> Seth[Сиф]
    Seth --> Enos[Енос]
    Adam --> Cain[Каин]`;

    mermaid.initialize({ 
        startOnLoad: false, 
        securityLevel: 'loose', 
        theme: 'neutral'
    });

    async function renderGraph() {
        const container = document.getElementById('tree-container');
        
        if (window.panZoom) {
            window.panZoom.destroy();
            window.panZoom = null;
        }

        // Очищаем и создаем новый div для рендера
        container.innerHTML = `<div id="temp-mermaid-holder">${currentGraphDefinition}</div>`;

        try {
            const { svg } = await mermaid.render('mermaid-svg-' + Date.now(), currentGraphDefinition);
            container.innerHTML = svg;
            
            setTimeout(initPanZoom, 50);
        } catch (err) {
            console.error("Ошибка Mermaid:", err);
        }
    }

    function initPanZoom() {
        const svgElement = document.querySelector('#tree-container svg');
        if (svgElement) {
            window.panZoom = svgPanZoom(svgElement, {
                zoomEnabled: true,
                controlIconsEnabled: true,
                fit: true,
                center: true,
                minZoom: 0.01,
                maxZoom: 50
            });
        }
    }

    // Слушатель правой кнопки мыши
    window.addEventListener('contextmenu', function(e) {
        const node = e.target.closest('.node');
        if (node) {
            e.preventDefault();
            // Находим ID в атрибутах или тексте
            selectedNodeId = node.getAttribute('id').split('-')[1]; 

            const menu = document.getElementById('context-menu');
            menu.style.display = 'block';
            menu.style.left = e.pageX + 'px';
            menu.style.top = e.pageY + 'px';
        } else {
            document.getElementById('context-menu').style.display = 'none';
        }
    });

    window.addEventListener('click', () => {
        document.getElementById('context-menu').style.display = 'none';
    });

    function menuAction(type) {
        if (!selectedNodeId) return;

        if (type === 'edit') {
            const newName = prompt("Новое имя:");
            if (newName) {
                const regex = new RegExp(`${selectedNodeId}\\[.*?\\]`, 'g');
                currentGraphDefinition = currentGraphDefinition.replace(regex, `${selectedNodeId}[${newName}]`);
            }
        } 
        else if (type === 'add') {
            const childName = prompt("Имя потомка:");
            if (childName) {
                const childId = "id" + Math.random().toString(36).substr(2, 5);
                currentGraphDefinition += `\n    ${selectedNodeId} --> ${childId}[${childName}]`;
            }
        } 
        else if (type === 'delete') {
            if (confirm("Удалить?")) {
                const lines = currentGraphDefinition.split('\n');
                currentGraphDefinition = lines.filter(line => !line.includes(selectedNodeId)).join('\n');
            }
        }
        renderGraph();
    }

    function resetView() {
        if (window.panZoom) {
            window.panZoom.reset();
            window.panZoom.fit();
            window.panZoom.center();
        }
    }

    function exportCode() {
        console.log(currentGraphDefinition);
        alert("Код в консоли (F12)");
    }

    window.onload = renderGraph;
</script>

</body>
</html>
