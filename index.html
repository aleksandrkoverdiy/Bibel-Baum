<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чистое Родословие</title>
    
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #fdf5e6; overflow: hidden; }
        
        /* Контейнер на весь экран */
        #tree-container { 
            width: 100vw; 
            height: 100vh; 
            cursor: grab;
            background-image: radial-gradient(#d2b48c 0.5px, transparent 0.5px);
            background-size: 30px 30px;
        }

        /* КОНТЕКСТНОЕ МЕНЮ */
        #context-menu { 
            display: none; position: fixed; background: #fff; 
            border: 2px solid #5d4037; box-shadow: 4px 4px 15px rgba(0,0,0,0.4); 
            z-index: 9999; min-width: 180px; font-family: sans-serif;
        }
        #context-menu div { padding: 10px 15px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 14px; color: #333; }
        #context-menu div:hover { background: #f0e6d2; }

        /* МОДАЛЬНОЕ ОКНО */
        #info-modal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 300px; background: #fffcf5; border: 5px double #5d4037; padding: 20px; 
            z-index: 10000; box-shadow: 0 0 50px rgba(0,0,0,0.5); text-align: center;
            font-family: 'Times New Roman', serif;
        }
        #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 9998; }

        /* СТИЛИ ГРАФА */
        .infoNode rect { fill: #fcf3cf !important; stroke: #b7950b !important; stroke-width: 3px !important; }
        svg { width: 100% !important; height: 100% !important; display: block; }
    </style>
</head>
<body>

<div id="modal-overlay" onclick="closeInfo()"></div>
<div id="info-modal">
    <h2 id="modal-title" style="margin:0;"></h2>
    <hr style="border: 1px double #5d4037; margin: 10px 0;">
    <p id="modal-desc" style="font-style: italic; white-space: pre-wrap; color: #3e2723;"></p>
    <button onclick="closeInfo()" style="margin-top:15px; width: 100%; background: #5d4037; color: white; border: none; padding: 8px; cursor: pointer;">Закрыть</button>
</div>

<div id="context-menu">
    <div onclick="menuAction('edit')">✏️ Изменить имя</div>
    <div onclick="menuAction('info')" id="menu-info-btn">📝 Информация</div>
    <div onclick="menuAction('add')">➕ Добавить потомка</div>
    <div onclick="menuAction('delete')" style="color: #d32f2f;">❌ Удалить</div>
</div>

<div id="tree-container"></div>

<script>
    let selectedNodeId = null;
    
    const defaultGraph = `graph TD\n    Adam[Адам] --> Seth[Сиф]`;
    const defaultInfo = { "Adam": "Первый человек." };

    let currentGraphDefinition = localStorage.getItem('genealogy_graph') || defaultGraph;
    let nodesData = JSON.parse(localStorage.getItem('genealogy_info')) || defaultInfo;

    mermaid.initialize({ startOnLoad: false, securityLevel: 'loose', theme: 'neutral' });

    async function renderGraph() {
        const container = document.getElementById('tree-container');
        if (window.panZoom) window.panZoom.destroy();

        localStorage.setItem('genealogy_graph', currentGraphDefinition);
        localStorage.setItem('genealogy_info', JSON.stringify(nodesData));

        let styleInjections = "";
        Object.keys(nodesData).forEach(id => { styleInjections += `\n    class ${id} infoNode`; });

        const fullDefinition = currentGraphDefinition + styleInjections;

        try {
            const { svg } = await mermaid.render('mermaid-svg-' + Date.now(), fullDefinition);
            container.innerHTML = svg;
            setTimeout(initPanZoom, 20);
        } catch (err) { console.error(err); }
    }

    function initPanZoom() {
        const svg = document.querySelector('#tree-container svg');
        if (svg) {
            window.panZoom = svgPanZoom(svg, { 
                zoomEnabled: true, 
                controlIconsEnabled: false, 
                fit: true, 
                center: true,
                minZoom: 0.01,
                maxZoom: 100
            });
        }
    }

    window.addEventListener('mousedown', function(e) {
        const node = e.target.closest('.node');
        if (!node) {
            if (e.button === 0) document.getElementById('context-menu').style.display = 'none';
            return;
        }

        const parts = node.getAttribute('id').split('-');
        selectedNodeId = parts[1];

        if (e.button === 2) {
            e.preventDefault();
            const infoBtn = document.getElementById('menu-info-btn');
            infoBtn.innerText = nodesData[selectedNodeId] ? "📝 Изменить инфо" : "📝 Добавить инфо";
            const menu = document.getElementById('context-menu');
            menu.style.display = 'block';
            menu.style.left = e.pageX + 'px';
            menu.style.top = e.pageY + 'px';
        } 
        else if (e.button === 0) {
            if (nodesData[selectedNodeId]) showInfo(selectedNodeId);
        }
    });

    window.oncontextmenu = (e) => { if(e.target.closest('.node')) return false; };

    function showInfo(id) {
        const nodeEl = document.querySelector(`#flowchart-${id}-` + " .nodeLabel") || {innerText: id};
        document.getElementById('modal-title').innerText = nodeEl.innerText || id;
        document.getElementById('modal-desc').innerText = nodesData[id];
        document.getElementById('info-modal').style.display = 'block';
        document.getElementById('modal-overlay').style.display = 'block';
    }

    function closeInfo() {
        document.getElementById('info-modal').style.display = 'none';
        document.getElementById('modal-overlay').style.display = 'none';
    }

    function menuAction(type) {
        if (!selectedNodeId) return;
        document.getElementById('context-menu').style.display = 'none';

        if (type === 'info') {
            const newInfo = prompt("Описание:", nodesData[selectedNodeId] || "");
            if (newInfo !== null) {
                if (newInfo.trim() === "") delete nodesData[selectedNodeId];
                else nodesData[selectedNodeId] = newInfo;
            }
        } 
        else if (type === 'edit') {
            const newName = prompt("Имя:");
            if (newName) {
                const regex = new RegExp(`${selectedNodeId}\\[.*?\\]`, 'g');
                currentGraphDefinition = currentGraphDefinition.replace(regex, `${selectedNodeId}[${newName}]`);
            }
        }
        else if (type === 'add') {
            const childName = prompt("Имя потомка:");
            if (childName) {
                const childId = "id" + Math.random().toString(36).substr(2, 5);
                currentGraphDefinition += `\n    ${selectedNodeId} --> ${childId}[${childName}]`;
            }
        }
        else if (type === 'delete') {
            if (confirm("Удалить?")) {
                const lines = currentGraphDefinition.split('\n');
                currentGraphDefinition = lines.filter(line => !line.includes(selectedNodeId)).join('\n');
                delete nodesData[selectedNodeId];
            }
        }
        renderGraph();
    }

    window.onload = renderGraph;
</script>

</body>
</html>
