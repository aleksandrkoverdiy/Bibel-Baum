<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Библейская Родословная</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #2c1e14; font-family: 'Georgia', serif; touch-action: none; }
        
        /* Видимая область */
        #viewport { 
            width: 100vw; 
            height: 100vh; 
            overflow: hidden; 
            position: relative; 
            cursor: grab;
        }
        #viewport:active { cursor: grabbing; }

        /* Бесконечный холст */
        #scroll-container { 
            position: absolute; 
            width: 10000px; /* Увеличили размер для большой родословной */
            height: 10000px; 
            background: #f4e4bc url('https://www.transparenttextures.com/patterns/parchment.png');
            transform-origin: 0 0;
            will-change: transform;
        }

        #search-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 100; }
        #search { 
            padding: 12px 25px; border-radius: 30px; border: 2px solid #8b4513; 
            background: #fff9e6; width: 280px; outline: none; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.4); font-size: 16px;
        }

        .person {
            position: absolute;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(139, 69, 19, 0.3);
            border-radius: 8px;
            text-align: center;
            white-space: nowrap;
            user-select: none;
            color: #3e2723;
            font-weight: bold;
            box-shadow: 2px 4px 8px rgba(0,0,0,0.1);
            transition: background 0.3s;
        }
        
        .has-info { border: 2px solid #8b4513; background: rgba(255, 255, 255, 0.8); }
        .highlight { 
            background: #ffeb3b !important; 
            border: 2px solid #f44336 !important; 
            transform: scale(1.2); 
            z-index: 1000;
        }

        .line { position: absolute; background: #8b4513; height: 2px; transform-origin: 0 0; pointer-events: none; opacity: 0.4; }

        #context-menu {
            position: fixed; display: none; background: #fff; border: 1px solid #8b4513;
            box-shadow: 5px 5px 20px rgba(0,0,0,0.3); z-index: 2000; min-width: 220px;
            border-radius: 5px;
        }
        #context-menu div { padding: 12px 20px; cursor: pointer; border-bottom: 1px solid #eee; }
        #context-menu div:hover { background: #fdf5e6; color: #8b4513; }
    </style>
</head>
<body>

<div id="search-container"><input type="text" id="search" placeholder="Кого найти в роду?"></div>
<div id="viewport"><div id="scroll-container"><div id="tree-content"></div></div></div>
<div id="context-menu"></div>

<script>
    const viewport = document.getElementById('viewport');
    const container = document.getElementById('scroll-container');
    const content = document.getElementById('tree-content');
    const menu = document.getElementById('context-menu');
    const searchInput = document.getElementById('search');

    let scale = 0.8; 
    let posX = -2000, posY = -100; // Начальная позиция (центровка на Адама)
    let isDraggingView = false;
    let startX, startY;
    
    let isOwner = window.location.hash === '#admin';
    let familyData = JSON.parse(localStorage.getItem('bibleTree')) || [
        { id: 1, name: "Адам", info: "Первый человек", x: 2500, y: 200, parentId: null }
    ];

    let draggedPerson = null;
    let personOffset = { x: 0, y: 0 };

    function updateTransform() {
        container.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
    }

    function render() {
        content.innerHTML = '';
        familyData.forEach(person => {
            const div = document.createElement('div');
            div.className = `person ${person.info ? 'has-info' : ''}`;
            div.id = `person-${person.id}`;
            div.style.left = person.x + 'px';
            div.style.top = person.y + 'px';
            div.innerText = person.name;

            if (isOwner) {
                div.onmousedown = (e) => {
                    if (e.button !== 0) return;
                    draggedPerson = person;
                    const rect = div.getBoundingClientRect();
                    personOffset.x = (e.clientX - rect.left) / scale;
                    personOffset.y = (e.clientY - rect.top) / scale;
                    e.stopPropagation();
                };
            }

            div.onclick = (e) => {
                if (person.info) alert(`📜 ${person.name}\n\n${person.info}`);
            };

            div.oncontextmenu = (e) => {
                if (!isOwner) return;
                e.preventDefault(); e.stopPropagation();
                showMenu(e.clientX, e.clientY, person);
            };

            content.appendChild(div);

            if (person.parentId) {
                const parent = familyData.find(p => p.id === person.parentId);
                if (parent) drawLine(parent.x + 40, parent.y + 40, person.x + 40, person.y);
            }
        });
        localStorage.setItem('bibleTree', JSON.stringify(familyData));
        updateTransform();
    }

    // ЛОГИКА ПЕРЕМЕЩЕНИЯ ХОЛСТА (PANNING)
    viewport.onmousedown = (e) => {
        if (e.button === 0 && !draggedPerson) {
            isDraggingView = true;
            startX = e.clientX - posX;
            startY = e.clientY - posY;
        }
    };

    window.onmousemove = (e) => {
        if (isDraggingView) {
            posX = e.clientX - startX;
            posY = e.clientY - startY;
            updateTransform();
        } else if (draggedPerson) {
            const rect = container.getBoundingClientRect();
            draggedPerson.x = (e.clientX - rect.left) / scale - personOffset.x;
            draggedPerson.y = (e.clientY - rect.top) / scale - personOffset.y;
            render();
        }
    };

    window.onmouseup = () => { isDraggingView = false; draggedPerson = null; };

    // ЗУМ (Колесико)
    viewport.onwheel = (e) => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        scale = Math.min(Math.max(0.1, scale * delta), 2);
        updateTransform();
    };

    // ПОИСК И ФОКУСИРОВКА
    searchInput.oninput = () => {
        const val = searchInput.value.toLowerCase();
        document.querySelectorAll('.person').forEach(el => {
            const isMatch = val && el.innerText.toLowerCase().includes(val);
            el.classList.toggle('highlight', isMatch);
            
            if (isMatch && val.length > 2) {
                // Если введено больше 2 букв, плавно двигаем камеру к первому найденному
                const id = el.id.replace('person-', '');
                const person = familyData.find(p => p.id == id);
                posX = (window.innerWidth / 2) - (person.x * scale);
                posY = (window.innerHeight / 2) - (person.y * scale);
                updateTransform();
            }
        });
    };

    // Линии, Меню и остальное (аналогично предыдущему коду)
    function drawLine(x1, y1, x2, y2) {
        const length = Math.sqrt((x2-x1)**2 + (y2-y1)**2);
        const angle = Math.atan2(y2-y1, x2-x1) * 180 / Math.PI;
        const line = document.createElement('div');
        line.className = 'line';
        line.style.width = length + 'px';
        line.style.left = x1 + 'px';
        line.style.top = y1 + 'px';
        line.style.transform = `rotate(${angle}deg)`;
        content.appendChild(line);
    }

    function showMenu(x, y, person) {
        menu.style.display = 'block'; menu.style.left = x + 'px'; menu.style.top = y + 'px';
        if (person) {
            menu.innerHTML = `
                <div onclick="addRelative(${person.id})">👶 Добавить наследника</div>
                <div onclick="editName(${person.id})">✏️ Изменить имя</div>
                <div onclick="editInfo(${person.id})">📖 Инфо</div>
                <div onclick="deletePerson(${person.id})" style="color:red">🗑️ Удалить</div>
            `;
        } else {
            const rect = container.getBoundingClientRect();
            const realX = (x - rect.left) / scale;
            const realY = (y - rect.top) / scale;
            menu.innerHTML = `<div onclick="createNew(${realX}, ${realY})">👤 Создать родоначальника</div>`;
        }
    }

    window.createNew = (x, y) => {
        const name = prompt("Имя:");
        if (name) { familyData.push({ id: Date.now(), name, info: "", x, y, parentId: null }); render(); }
    };

    window.addRelative = (parentId) => {
        const name = prompt("Имя наследника:");
        if (name) {
            const p = familyData.find(x => x.id === parentId);
            const c = familyData.filter(x => x.parentId === parentId).length;
            familyData.push({ id: Date.now(), name, info: "", x: p.x + (c * 180), y: p.y + 120, parentId });
            render();
        }
    };

    window.editName = (id) => {
        const p = familyData.find(x => x.id === id);
        const n = prompt("Имя:", p.name);
        if (n) { p.name = n; render(); }
    };

    window.editInfo = (id) => {
        const p = familyData.find(x => x.id === id);
        const i = prompt("Информация:", p.info);
        if (i !== null) { p.info = i; render(); }
    };

    window.deletePerson = (id) => {
        if (confirm("Удалить?")) { familyData = familyData.filter(p => p.id !== id); render(); }
    };

    window.oncontextmenu = (e) => {
        if (!isOwner) return;
        if (e.target.id === 'viewport' || e.target === container) {
            e.preventDefault(); showMenu(e.clientX, e.clientY, null);
        }
    };
    window.onclick = () => menu.style.display = 'none';

    render();
</script>
</body>
</html>
