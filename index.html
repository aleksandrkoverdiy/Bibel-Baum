<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Библейская Родословная</title>
    <style>
        /* Основные стили */
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #2c1e14; 
            font-family: 'Georgia', serif; 
            touch-action: none; /* Отключаем стандартные жесты браузера для своего управления */
        }
        
        #viewport { 
            width: 100vw; 
            height: 100vh; 
            overflow: hidden; 
            position: relative; 
            cursor: grab;
        }
        #viewport:active { cursor: grabbing; }

        /* Холст свитка */
        #scroll-container { 
            position: absolute; 
            width: 8000px; 
            height: 8000px; 
            background: #f4e4bc url('https://www.transparenttextures.com/patterns/parchment.png');
            transform-origin: 0 0;
            will-change: transform;
        }

        /* Поиск */
        #search-container { 
            position: fixed; 
            top: 20px; 
            left: 50%; 
            transform: translateX(-50%); 
            z-index: 100; 
        }
        #search { 
            padding: 12px 25px; 
            border-radius: 30px; 
            border: 2px solid #8b4513; 
            background: #fff9e6; 
            width: 280px; 
            outline: none; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.4); 
            font-size: 16px;
        }

        /* Имена (Узлы) */
        .person {
            position: absolute;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(139, 69, 19, 0.3);
            border-radius: 8px;
            text-align: center;
            white-space: nowrap;
            user-select: none;
            color: #3e2723;
            font-weight: bold;
            box-shadow: 2px 4px 8px rgba(0,0,0,0.1);
        }
        
        .has-info { 
            border: 2px solid #8b4513; 
            background: rgba(255, 255, 255, 0.8); 
        }

        .highlight { 
            background: #ffeb3b !important; 
            border: 2px solid #f44336 !important; 
            z-index: 1000;
        }

        /* Линии связи */
        .line { 
            position: absolute; 
            background: #8b4513; 
            height: 2px; 
            transform-origin: 0 0; 
            pointer-events: none; 
            opacity: 0.4; 
        }

        /* Контекстное меню */
        #context-menu {
            position: fixed; 
            display: none; 
            background: #fff; 
            border: 1px solid #8b4513;
            box-shadow: 5px 5px 20px rgba(0,0,0,0.3); 
            z-index: 2000; 
            min-width: 220px;
            border-radius: 5px;
        }
        #context-menu div { 
            padding: 12px 20px; 
            cursor: pointer; 
            border-bottom: 1px solid #eee; 
            font-size: 14px;
        }
        #context-menu div:hover { background: #fdf5e6; color: #8b4513; }
        #context-menu div:last-child { border: none; }
    </style>
</head>
<body>

<div id="search-container">
    <input type="text" id="search" placeholder="Кого найти в роду?">
</div>

<div id="viewport">
    <div id="scroll-container">
        <div id="tree-content"></div>
    </div>
</div>

<div id="context-menu"></div>

<script>
    const viewport = document.getElementById('viewport');
    const container = document.getElementById('scroll-container');
    const content = document.getElementById('tree-content');
    const menu = document.getElementById('context-menu');
    const searchInput = document.getElementById('search');

    // Настройки отображения
    let scale = 0.8; 
    let posX = 0, posY = 0; 
    let isDraggingView = false;
    let startX, startY;
    
    // Режим админа включается через #admin в ссылке
    let isOwner = window.location.hash === '#admin';
    
    // Данные (загрузка из памяти браузера или начальное значение)
    let familyData = JSON.parse(localStorage.getItem('bibleTree')) || [
        { id: 1, name: "Адам", info: "Первый человек", x: 4000, y: 200, parentId: null }
    ];

    let draggedPerson = null;
    let personOffset = { x: 0, y: 0 };

    function updateTransform() {
        container.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
    }

    function render() {
        content.innerHTML = '';
        familyData.forEach(person => {
            const div = document.createElement('div');
            div.className = `person ${person.info ? 'has-info' : ''}`;
            div.id = `person-${person.id}`;
            div.style.left = person.x + 'px';
            div.style.top = person.y + 'px';
            div.innerText = person.name;

            // Перетаскивание узла (ЛКМ - только для админа)
            if (isOwner) {
                div.onmousedown = (e) => {
                    if (e.button !== 0) return;
                    draggedPerson = person;
                    const rect = div.getBoundingClientRect();
                    personOffset.x = (e.clientX - rect.left) / scale;
                    personOffset.y = (e.clientY - rect.top) / scale;
                    e.stopPropagation();
                };
            }

            // Клик для информации (для всех)
            div.onclick = (e) => {
                e.stopPropagation();
                if (person.info) alert(`📜 ${person.name}\n\n${person.info}`);
            };

            // Правый клик для меню (только для админа)
            div.oncontextmenu = (e) => {
                if (!isOwner) return;
                e.preventDefault(); e.stopPropagation();
                showMenu(e.clientX, e.clientY, person);
            };

            content.appendChild(div);

            // Рисование стрелок к родителям
            if (person.parentId) {
                const parent = familyData.find(p => p.id === person.parentId);
                if (parent) drawLine(parent.x + 40, parent.y + 40, person.x + 40, person.y);
            }
        });
        localStorage.setItem('bibleTree', JSON.stringify(familyData));
        updateTransform();
    }

    // --- УПРАВЛЕНИЕ МЫШЬЮ ---

    viewport.onmousedown = (e) => {
        if (e.button === 0 && !draggedPerson) {
            isDraggingView = true;
            startX = e.clientX - posX;
            startY = e.clientY - posY;
        }
    };

    window.onmousemove = (e) => {
        if (isDraggingView) {
            posX = e.clientX - startX;
            posY = e.clientY - startY;
            updateTransform();
        } else if (draggedPerson) {
            const rect = container.getBoundingClientRect();
            draggedPerson.x = (e.clientX - rect.left) / scale - personOffset.x;
            draggedPerson.y = (e.clientY - rect.top) / scale - personOffset.y;
            render();
        }
    };

    window.onmouseup = () => { 
        isDraggingView = false; 
        draggedPerson = null; 
    };

    // Зум колесиком
    viewport.onwheel = (e) => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        scale = Math.min(Math.max(0.1, scale * delta), 2);
        updateTransform();
    };

    // --- УПРАВЛЕНИЕ ТАЧПАДОМ/ТЕЛЕФОНОМ ---
    let lastTouchX, lastTouchY;
    viewport.addEventListener('touchstart', (e) => {
        if (e.touches.length === 1) {
            isDraggingView = true;
            lastTouchX = e.touches[0].clientX;
            lastTouchY = e.touches[0].clientY;
        }
    }, { passive: false });

    viewport.addEventListener('touchmove', (e) => {
        if (isDraggingView && e.touches.length === 1) {
            posX += (e.touches[0].clientX - lastTouchX);
            posY += (e.touches[0].clientY - lastTouchY);
            lastTouchX = e.touches[0].clientX;
            lastTouchY = e.touches[0].clientY;
            updateTransform();
        }
    }, { passive: false });

    viewport.addEventListener('touchend', () => isDraggingView = false);

    // --- ПОИСК ---
    searchInput.oninput = () => {
        const val = searchInput.value.toLowerCase();
        document.querySelectorAll('.person').forEach(el => {
            const isMatch = val && el.innerText.toLowerCase().includes(val);
            el.classList.toggle('highlight', isMatch);
            
            if (isMatch && val.length > 2) {
                const id = el.id.replace('person-', '');
                const person = familyData.find(p => p.id == id);
                posX = (window.innerWidth / 2) - (person.x * scale);
                posY = (window.innerHeight / 2) - (person.y * scale);
                updateTransform();
            }
        });
    };

    // --- ФУНКЦИИ МЕНЮ ---
    function drawLine(x1, y1, x2, y2) {
        const length = Math.sqrt((x2-x1)**2 + (y2-y1)**2);
        const angle = Math.atan2(y2-y1, x2-x1) * 180 / Math.PI;
        const line = document.createElement('div');
        line.className = 'line';
        line.style.width = length + 'px';
        line.style.left = x1 + 'px';
        line.style.top = y1 + 'px';
        line.style.transform = `rotate(${angle}deg)`;
        content.appendChild(line);
    }

    function showMenu(x, y, person) {
        menu.style.display = 'block'; 
        menu.style.left = x + 'px'; 
        menu.style.top = y + 'px';
        if (person) {
            menu.innerHTML = `
                <div onclick="addRelative(${person.id})">👶 Добавить наследника</div>
                <div onclick="editName(${person.id})">✏️ Изменить имя</div>
                <div onclick="editInfo(${person.id})">📖 ${person.info ? 'Изм.' : 'Добавить'} информацию</div>
                <div onclick="deletePerson(${person.id})" style="color:red">🗑️ Удалить человека</div>
            `;
        } else {
            const rect = container.getBoundingClientRect();
            const realX = (x - rect.left) / scale;
            const realY = (y - rect.top) / scale;
            menu.innerHTML = `<div onclick="createNew(${realX}, ${realY})">👤 Создать новое имя</div>`;
        }
    }

    window.createNew = (x, y) => {
        const name = prompt("Введите имя:");
        if (name) { 
            familyData.push({ id: Date.now(), name, info: "", x, y, parentId: null }); 
            render(); 
        }
    };

    window.addRelative = (parentId) => {
        const name = prompt("Имя наследника:");
        if (name) {
            const p = familyData.find(x => x.id === parentId);
            const count = familyData.filter(x => x.parentId === parentId).length;
            familyData.push({ 
                id: Date.now(), 
                name, 
                info: "", 
                x: p.x + (count * 180), 
                y: p.y + 120, 
                parentId 
            });
            render();
        }
    };

    window.editName = (id) => {
        const p = familyData.find(x => x.id === id);
        const n = prompt("Изменить имя:", p.name);
        if (n) { p.name = n; render(); }
    };

    window.editInfo = (id) => {
        const p = familyData.find(x => x.id === id);
        const i = prompt("Дополнительная информация:", p.info);
        if (i !== null) { p.info = i; render(); }
    };

    window.deletePerson = (id) => {
        if (confirm("Вы уверены, что хотите удалить этого человека?")) {
            familyData = familyData.filter(p => p.id !== id);
            render();
        }
    };

    // Центрирование при старте
    function centerOnStart() {
        if (familyData.length > 0) {
            posX = (window.innerWidth / 2) - (familyData[0].x * scale);
            posY = (window.innerHeight / 2) - (familyData[0].y * scale);
            updateTransform();
        }
    }

    window.oncontextmenu = (e) => {
        if (!isOwner) return;
        if (e.target.id === 'viewport' || e.target === container) {
            e.preventDefault(); showMenu(e.clientX, e.clientY, null);
        }
    };
    
    window.onclick = () => menu.style.display = 'none';

    window.onload = () => {
        render();
        centerOnStart();
    };
</script>
</body>
</html>
